<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- 
    Hyper-Detail Cyber Soldier (64x64 Pixel Art)
    At 64x64, we can define individual armor plates, wiring, and more complex shading.
  -->

  <!-- Background (Optional for preview) -->
  <!-- <rect width="64" height="64" fill="#1a1a1a" /> -->

  <!-- Back Thruster Unit -->
  <rect x="15" y="22" width="8" height="20" fill="#34495e" />
  <rect x="14" y="25" width="2" height="12" fill="#00f2ff" /> <!-- Energy Glow -->
  <rect x="13" y="28" width="1" height="6" fill="#ffffff" />  <!-- Hot core -->

  <!-- Body Under-suit (Dark Tech-fabric) -->
  <rect x="22" y="20" width="18" height="28" fill="#1b2631" />
  
  <!-- Chest Armor (Multi-plate) -->
  <rect x="23" y="22" width="16" height="12" fill="#7f8c8d" /> <!-- Main plate -->
  <rect x="24" y="23" width="14" height="4" fill="#95a5a6" />  <!-- Upper detail -->
  <rect x="23" y="28" width="16" height="1" fill="#2c3e50" />  <!-- Plate gap -->
  <rect x="28" y="36" width="6" height="4" fill="#00f2ff" />   <!-- Main Power Core -->
  <rect x="30" y="37" width="2" height="2" fill="#ffffff" />   <!-- Core intensity -->

  <!-- Helmet (Complex Visor) -->
  <rect x="24" y="4" width="20" height="18" fill="#7f8c8d" /> <!-- Helmet shell -->
  <rect x="26" y="6" width="16" height="1" fill="#bdc3c7" />  <!-- Top highlight -->
  
  <!-- Visor -->
  <rect x="29" y="8" width="15" height="7" fill="#2c3e50" />  <!-- Visor frame -->
  <rect x="30" y="9" width="14" height="5" fill="#f1c40f" />  <!-- Main Glow -->
  <rect x="35" y="9" width="9" height="2" fill="#f7dc6f" />   <!-- Upper reflection -->
  <rect x="42" y="10" width="2" height="3" fill="#ffffff" />  <!-- Sharp glint -->
  
  <!-- Respirator/Chin -->
  <rect x="30" y="16" width="8" height="4" fill="#34495e" />
  <rect x="32" y="17" width="4" height="1" fill="#5dade2" />  <!-- Filter glow -->

  <!-- Shoulder & Arm (Mechanical Joint) -->
  <rect x="20" y="21" width="8" height="8" fill="#95a5a6" /> <!-- Shoulder pad -->
  <rect x="21" y="22" width="6" height="2" fill="#bdc3c7" /> <!-- Top detail -->
  <!-- Arm -->
  <rect x="22" y="29" width="4" height="12" fill="#7f8c8d" />
  <rect x="23" y="30" width="1" height="10" fill="#00f2ff" /> <!-- Wiring glow -->
  <rect x="21" y="41" width="6" height="5" fill="#34495e" />  <!-- Gauntlet -->

  <!-- Legs (Hydraulic Armor) -->
  <rect x="23" y="48" width="7" height="12" fill="#7f8c8d" /> <!-- Front leg -->
  <rect x="23" y="55" width="7" height="1" fill="#2c3e50" />  <!-- Knee joint -->
  <rect x="22" y="60" width="9" height="3" fill="#34495e" />  <!-- Boot -->
  
  <rect x="33" y="48" width="7" height="10" fill="#2c3e50" /> <!-- Back leg (Shadowed) -->
  <rect x="32" y="58" width="9" height="3" fill="#1b2631" />  <!-- Back boot -->

  <!-- Small Details (Bolts, Scratches) -->
  <rect x="25" y="24" width="1" height="1" fill="#1a1a1a" opacity="0.5" />
  <rect x="37" y="30" width="1" height="1" fill="#1a1a1a" opacity="0.5" />
  <rect x="40" y="15" width="2" height="1" fill="#c0392b" opacity="0.4" /> <!-- Tiny warning light -->
</svg>
