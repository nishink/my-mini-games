<svg xmlns="http://www.w3.org/2000/svg" width="500" height="600" viewBox="0 0 500 600">
  <defs>
    <!-- Vintage Grain Filter -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1" />
      </feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic" />
    </filter>

    <!-- Paper Texture -->
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
      <feDiffuseLighting in="noise" lighting-color="#f4ecd8" surfaceScale="2">
        <fePointLight x="250" y="300" z="100" />
      </feDiffuseLighting>
    </filter>

    <!-- Gradient for Shading -->
    <radialGradient id="cupShade" cx="45%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#d5d5d5" />
    </radialGradient>
  </defs>

  <!-- Background Paper -->
  <rect width="500" height="600" fill="#f4ecd8" filter="url(#paper)" />

  <!-- The Character: "Old Timer Teapot" (Cuphead Style) -->
  <g filter="url(#grain)">
    
    <!-- Rubber Hose Limbs (Thick Ink Strokes) -->
    <!-- Right Arm -->
    <path d="M350 320 Q420 300 430 220" fill="none" stroke="#1a1a1a" stroke-width="22" stroke-linecap="round" />
    <!-- Left Arm -->
    <path d="M150 320 Q80 350 70 420" fill="none" stroke="#1a1a1a" stroke-width="22" stroke-linecap="round" />
    
    <!-- Gloved Hands -->
    <g id="hand-right" transform="translate(415, 180) rotate(-20)">
      <ellipse cx="20" cy="30" rx="30" ry="25" fill="#fff" stroke="#1a1a1a" stroke-width="6" />
      <path d="M10 15 Q0 20 5 35 M20 15 Q15 20 20 35 M30 15 Q35 20 35 35" fill="none" stroke="#1a1a1a" stroke-width="3" /> <!-- Glove details -->
    </g>
    <g id="hand-left" transform="translate(45, 410) rotate(160)">
      <ellipse cx="20" cy="30" rx="30" ry="25" fill="#fff" stroke="#1a1a1a" stroke-width="6" />
      <path d="M10 15 Q0 20 5 35 M20 15 Q15 20 20 35 M30 15 Q35 20 35 35" fill="none" stroke="#1a1a1a" stroke-width="3" />
    </g>

    <!-- Legs -->
    <path d="M220 450 Q210 520 180 540" fill="none" stroke="#1a1a1a" stroke-width="24" stroke-linecap="round" />
    <path d="M280 450 Q290 520 320 540" fill="none" stroke="#1a1a1a" stroke-width="24" stroke-linecap="round" />
    
    <!-- Giant Cartoon Shoes -->
    <ellipse cx="160" cy="550" rx="45" ry="30" fill="#a0522d" stroke="#1a1a1a" stroke-width="6" />
    <ellipse cx="340" cy="550" rx="45" ry="30" fill="#a0522d" stroke="#1a1a1a" stroke-width="6" />

    <!-- Body (The Teapot/Cup) -->
    <g id="main-body">
      <!-- Handle -->
      <path d="M340 250 Q410 250 410 320 Q410 390 340 390" fill="none" stroke="#1a1a1a" stroke-width="25" stroke-linecap="round" />
      <path d="M340 250 Q390 250 390 320 Q390 390 340 390" fill="none" stroke="url(#cupShade)" stroke-width="15" stroke-linecap="round" />
      
      <!-- Cup Base -->
      <path d="M140 220 Q140 450 250 450 Q360 450 360 220 Z" fill="url(#cupShade)" stroke="#1a1a1a" stroke-width="8" />
      
      <!-- Liquid/Inside -->
      <ellipse cx="250" cy="220" rx="110" ry="30" fill="#1a1a1a" />
      <ellipse cx="250" cy="215" rx="100" ry="25" fill="#6d4c41" /> <!-- Coffee/Tea -->

      <!-- Face -->
      <!-- Pie Eyes (Iconic 1930s Style) -->
      <g transform="translate(190, 280)">
        <path d="M0 40 Q-15 0 0 -40 Q15 0 0 40" fill="#1a1a1a" /> <!-- Left Eye -->
        <path d="M0 5 L15 0 L0 -5 Z" fill="#f4ecd8" /> <!-- Pie Cut -->
      </g>
      <g transform="translate(280, 280)">
        <path d="M0 40 Q-15 0 0 -40 Q15 0 0 40" fill="#1a1a1a" /> <!-- Right Eye -->
        <path d="M0 5 L15 0 L0 -5 Z" fill="#f4ecd8" /> <!-- Pie Cut -->
      </g>

      <!-- Huge Grin -->
      <path d="M180 350 Q250 430 320 350" fill="#fff" stroke="#1a1a1a" stroke-width="6" />
      <path d="M180 350 Q250 430 320 350 Z" fill="#fff" />
      <g stroke="#1a1a1a" stroke-width="2">
        <line x1="210" y1="365" x2="210" y2="395" />
        <line x1="250" y1="375" x2="250" y2="405" />
        <line x1="290" y1="365" x2="290" y2="395" />
      </g>
      
      <!-- Red Nose -->
      <circle cx="240" cy="330" r="15" fill="#c0392b" stroke="#1a1a1a" stroke-width="4" />
    </g>
  </g>

  <!-- Animated Film Scratches (Overlay) -->
  <g stroke="#fff" opacity="0.1">
    <line x1="100" y1="0" x2="105" y2="600">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="0.1s" repeatCount="indefinite" />
      <animate attributeName="x1" values="100;400;200" dur="3s" repeatCount="indefinite" />
    </line>
  </g>
</svg>
