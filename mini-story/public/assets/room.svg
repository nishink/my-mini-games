<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <!-- Floor Gradient -->
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3e2723;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b110a;stop-opacity:1" />
    </linearGradient>
    <!-- Wall Gradient -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1" />
    </linearGradient>
    <!-- Light Beam -->
    <radialGradient id="lightGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:0.2" />
      <stop offset="70%" style="stop-color:#f1c40f;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Walls -->
  <rect width="800" height="400" fill="url(#wallGrad)" />
  
  <!-- Floor -->
  <rect y="400" width="800" height="200" fill="url(#floorGrad)" />
  
  <!-- Perspective Floor Lines (Floorboards) -->
  <g stroke="#261a0d" stroke-width="1">
    <line x1="100" y1="400" x2="-200" y2="600" />
    <line x1="300" y1="400" x2="100" y2="600" />
    <line x1="500" y1="400" x2="400" y2="600" />
    <line x1="700" y1="400" x2="700" y2="600" />
    <line x1="900" y1="400" x2="1000" y2="600" />
  </g>

  <!-- Back Doors -->
  <!-- Left Door -->
  <rect x="180" y="100" width="140" height="280" fill="#34495e" stroke="#1a252f" stroke-width="4" />
  <circle cx="300" cy="240" r="5" fill="#f1c40f" /> <!-- Knob -->
  
  <!-- Right Door -->
  <rect x="480" y="100" width="140" height="280" fill="#34495e" stroke="#1a252f" stroke-width="4" />
  <circle cx="500" cy="240" r="5" fill="#f1c40f" /> <!-- Knob -->

  <!-- Light Beam from Ceiling -->
  <polygon points="100,-50 700,-50 850,650 -50,650" fill="url(#lightGrad)" />
  
  <!-- Dust Particles (Simulation) -->
  <circle cx="200" cy="150" r="1" fill="#fff" opacity="0.3" />
  <circle cx="550" cy="300" r="1.5" fill="#fff" opacity="0.2" />
  <circle cx="400" cy="50" r="1" fill="#fff" opacity="0.4" />
  <circle cx="100" cy="500" r="2" fill="#fff" opacity="0.1" />
</svg>
