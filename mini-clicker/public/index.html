<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini CLICKER - 放置クリッカー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-app">
        <!-- Main Section: Big Button and Score -->
        <section id="main-section">
            <div id="score-container">
                <h2 id="point-display">0 Points</h2>
                <p id="cps-display">per second: 0</p>
            </div>
            <div id="click-area">
                <button id="main-click-btn">
                    <span id="click-target">🍪</span>
                </button>
            </div>
        </section>

        <!-- Shop Section: Upgrades -->
        <section id="shop-section">
            <h3>Upgrades</h3>
            <div id="upgrade-list">
                <!-- Upgrades will be generated by JS -->
            </div>
            <div id="game-controls">
                <button id="reset-game-btn">Reset Progress</button>
            </div>
        </section>
    </div>

    <!-- Floating text container for click animations -->
    <div id="effects-layer"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
