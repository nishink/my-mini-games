<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mini CLICKER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body touch-action="none">
    <div id="game-app">
        <nav id="mobile-tabs" class="mobile-only">
            <button class="tab-btn active" data-tab="main">CLICK</button>
            <button class="tab-btn" data-tab="shop">SHOP</button>
        </nav>

        <!-- Main Section: Big Button and Score -->
        <section id="main-section" class="tab-content active">
            <div id="score-container">
                <h2 id="point-display">0 Points</h2>
                <p id="cps-display">per second: 0</p>
            </div>
            <div id="click-area">
                <button id="main-click-btn" aria-label="Click me!">
                    <span id="click-target">🍪</span>
                </button>
            </div>
        </section>

        <!-- Shop Section: Upgrades -->
        <section id="shop-section" class="tab-content">
            <header class="shop-header">
                <h3>Upgrades</h3>
            </header>
            <div id="upgrade-list">
                <!-- Upgrades will be generated by JS -->
            </div>
            <div id="game-controls">
                <button id="reset-game-btn">Reset Progress</button>
            </div>
        </section>
    </div>

    <!-- Floating text container for click animations -->
    <div id="effects-layer"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
