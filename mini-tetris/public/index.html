<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>mini-tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body touch-action="none">
    <header id="hud">
        <div class="info-box">
            <span class="label">SCORE</span>
            <span id="score">0</span>
        </div>
        <div class="info-box">
            <span class="label">LINES</span>
            <span id="lines">0</span>
        </div>
        <div class="info-box">
            <span class="label">LEVEL</span>
            <span id="level">1</span>
        </div>
    </header>

    <main id="game-container">
        <div id="game-area">
            <canvas id="game-canvas"></canvas>
            
            <div id="side-panel">
                <div class="info-box next-box">
                    <span class="label">NEXT</span>
                    <canvas id="next-canvas"></canvas>
                </div>
            </div>

            <div id="game-over" class="overlay hidden">
                <h1>GAME OVER</h1>
                <p>Score: <span id="final-score">0</span></p>
                <button id="restart-btn">RETRY</button>
            </div>
        </div>
    </main>

    <footer id="controls-footer">
        <div id="touch-controls">
            <div class="control-group movement">
                <button class="ctrl-btn" data-action="left" aria-label="Left">←</button>
                <button class="ctrl-btn" data-action="down" aria-label="Down">↓</button>
                <button class="ctrl-btn" data-action="right" aria-label="Right">→</button>
            </div>
            <div class="control-group actions">
                <button class="ctrl-btn action-btn" data-action="rotate-l" aria-label="Rotate Left">Z</button>
                <button class="ctrl-btn action-btn" data-action="rotate-r" aria-label="Rotate Right">X</button>
                <button class="ctrl-btn action-btn" data-action="hard-drop" aria-label="Hard Drop">⤓</button>
            </div>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
