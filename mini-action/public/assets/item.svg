<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- 
    Sci-Fi Power Gem (Score Item)
    A multifaceted, glowing diamond-like gem.
  -->
  
  <!-- Outer Glow -->
  <rect x="8" y="10" width="16" height="12" fill="#00f2ff" opacity="0.3" />
  <rect x="10" y="8" width="12" height="16" fill="#00f2ff" opacity="0.3" />

  <!-- Gem Body (Multifaceted) -->
  <path d="M16 4 L26 12 L16 28 L6 12 Z" fill="#00d2df" /> <!-- Base Shape -->
  
  <!-- Facets & Highlights -->
  <path d="M16 4 L26 12 L16 14 Z" fill="#00f2ff" /> <!-- Top Right Facet -->
  <path d="M16 4 L6 12 L16 14 Z" fill="#5effff" />  <!-- Top Left Facet (Brighter) -->
  <path d="M6 12 L16 28 L16 14 Z" fill="#00a2af" /> <!-- Bottom Left Facet (Shadow) -->
  <path d="M26 12 L16 28 L16 14 Z" fill="#00c2cf" /> <!-- Bottom Right Facet -->

  <!-- Central Sparkle -->
  <rect x="15" y="10" width="2" height="6" fill="#ffffff" />
  <rect x="13" y="12" width="6" height="2" fill="#ffffff" />
  <rect x="15" y="12" width="2" height="2" fill="#ffffff" />
</svg>
