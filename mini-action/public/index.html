<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mini Action Game</title>
    <link rel="stylesheet" href="./style.css" />
    </head>

    <body touch-action="none">
    <header id="hud">
        <div id="score">Score: <span id="scoreVal">0</span></div>
        <div id="lives">Lives: <span id="livesVal">3</span></div>
        <div id="level">Level: <span id="levelVal">1</span></div>
        <button id="resetBtn">Reset</button>
    </header>

    <main id="gameContainer">
        <div id="gameArea">
            <canvas id="gameCanvas" width="640" height="480"></canvas>
            <div id="message" style="display: none;"></div>
        </div>
    </main>

    <footer id="controlsFooter">
        <div id="touchControls">
            <div class="control-group movement">
                <button class="ctrl-btn" data-action="left" aria-label="Left">←</button>
                <button class="ctrl-btn" data-action="right" aria-label="Right">→</button>
            </div>
            <div class="control-group actions">
                <button class="ctrl-btn action-btn" data-action="shoot" aria-label="Shoot">B</button>
                <button class="ctrl-btn action-btn" data-action="jump" aria-label="Jump">A</button>
            </div>
        </div>
    </footer>

    <script type="module" src="./main.js"></script>
</body>

</html>
