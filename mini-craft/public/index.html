<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mini Craft</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body touch-action="none">
    <header id="hud">
        <div id="status">Mode: <span id="currentMode">Build</span></div>
        <button id="resetBtn">Clear All</button>
    </header>

    <main id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </main>

    <footer id="inventoryFooter">
        <div id="inventory">
            <!-- Inventory slots will be added via JavaScript -->
        </div>
        <div id="modeToggle">
            <button id="buildModeBtn" class="mode-btn active">Build (L-Click)</button>
            <button id="deleteModeBtn" class="mode-btn">Delete (Shift+Click)</button>
        </div>
    </footer>

    <script type="module" src="./main.js"></script>
</body>

</html>
