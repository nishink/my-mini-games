<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini SOKOBAN - 倉庫番パズル</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-overlay">
            <div id="status-bar">STAGE: <span id="stage-val">1</span> / <span id="stage-total">3</span></div>
            <div id="message-display">Push all boxes to goals!</div>
            <div id="controls-hint">Arrows/WASD: Move, R: Reset</div>
            <div id="level-clear" class="hidden">
                <h1>STAGE CLEAR!</h1>
                <button id="next-btn">NEXT STAGE</button>
            </div>
            <div id="game-complete" class="hidden">
                <h1>ALL STAGES CLEAR!</h1>
                <p>Congratulations!</p>
                <button id="restart-btn">RESTART FROM STAGE 1</button>
            </div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
