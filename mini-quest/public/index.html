<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mini Quest</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body touch-action="none">
    <header id="hud">
        <div id="status">進行状況: <span id="questStatus">カギを探そう</span></div>
        <button id="resetBtn">リセット</button>
    </header>

    <main id="gameContainer">
        <div id="gameArea">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="messageBox" class="message-window" style="display: none;">
                <div id="messageText"></div>
                <div class="next-indicator">▼</div>
            </div>
        </div>
    </main>

    <footer id="controlsFooter">
        <div id="touchControls">
            <div class="control-group movement">
                <div class="d-pad">
                    <button class="ctrl-btn up" data-action="up" aria-label="Up">↑</button>
                    <div class="horizontal-btns">
                        <button class="ctrl-btn left" data-action="left" aria-label="Left">←</button>
                        <button class="ctrl-btn right" data-action="right" aria-label="Right">→</button>
                    </div>
                    <button class="ctrl-btn down" data-action="down" aria-label="Down">↓</button>
                </div>
            </div>
            <div class="control-group actions">
                <button class="ctrl-btn action-btn" data-action="action" aria-label="Action">A</button>
            </div>
        </div>
    </footer>

    <script type="module" src="./main.js"></script>
</body>

</html>
