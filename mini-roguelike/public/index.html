<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mini Roguelike (Prototype)</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <header id="hud">
        <div id="hp">HP: <span id="hpVal">10</span></div>
        <div id="floor">Floor: <span id="floorVal">1</span></div>
        <div id="turn">Turn: <span id="turnVal">0</span></div>
    </header>

    <main>
        <div id="gameArea">
            <div id="grid" aria-label="game-grid"></div>
        </div>
        <aside id="rightPanel">
            <div id="log"></div>
            <button id="nextFloorBtn" style="display:none">次の階へ</button>
        </aside>
    </main>

    <!-- Mobile controls -->
    <div id="touchControls" aria-hidden="true">
        <button data-dir="0,-1">↑</button>
        <div>
            <button data-dir="-1,0">←</button>
            <button data-dir="1,0">→</button>
        </div>
        <button data-dir="0,1">↓</button>
    </div>

    <script type="module" src="./main.js"></script>

    <div id="gameOverScreen" class="overlay" style="display: none;">
        <div class="overlay-content">
            <h2>ゲームオーバー</h2>
            <div id="finalStats"></div>
            <button id="retryBtn">もう一度挑戦する</button>
        </div>
    </div>

    <div id="gameClearScreen" class="overlay" style="display: none;">
        <div class="overlay-content">
            <h2>ダンジョン制覇！</h2>
            <div id="clearStats"></div>
            <button id="newGameBtn">もう一度挑戦する</button>
        </div>
    </div>
</body>

</html>
