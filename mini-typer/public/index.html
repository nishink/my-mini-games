<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>mini-typer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body touch-action="none">
    <div id="game-app">
        <header id="hud">
            <div class="info-box">
                <span class="label">SCORE</span>
                <span id="score">0</span>
            </div>
            <div class="info-box">
                <span class="label">BEST</span>
                <span id="best">0</span>
            </div>
            <button id="kb-trigger">Tap to Type</button>
        </header>

        <main id="game-container">
            <canvas id="game-canvas"></canvas>
            <!-- 隠し入力フィールド -->
            <input type="text" id="hidden-input" autocomplete="off" autocapitalize="none" spellcheck="false" aria-hidden="true">
        </main>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1>FAILED TO TYPE...</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button id="restart-btn">RETRY</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
